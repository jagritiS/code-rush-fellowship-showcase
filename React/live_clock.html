<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Live Clock</h1>
    <p id="time"></p>

    <script>
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString();
            document.getElementById("time").innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>

</html>
