<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button type="button" id="clickPassword">Show</button>
        <button type="submit">Submit</button>
    </form>
    <script>
        const form = document.querySelector("form");
        const passwordInput = document.getElementById("password");
        const clickPassword = document.getElementById("clickPassword");

        clickPassword.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                clickPassword.textContent = "Hide";
            } else {
                passwordInput.type = "password";
                clickPassword.textContent = "Show";
            }
        });

        form.addEventListener("submit", (e) => {
            e.preventDefault(); // prevent default form submission
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = passwordInput.value;
            console.log(name, email, password);
        });
    </script>
</body>

</html>
